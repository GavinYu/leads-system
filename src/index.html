<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>免费领取50元代金券</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="min-h-screen bg-gradient-to-b from-amber-50 to-orange-50 flex items-center justify-center p-4">

<!-- ===== 表单页 ===== -->
<div id="formPage" class="bg-white w-full max-w-md rounded-2xl shadow-lg border border-orange-100 overflow-hidden">
  <div class="bg-gradient-to-r from-orange-500 to-rose-500 px-6 py-5 text-white text-center">
    <h1 class="text-xl font-bold leading-snug">🎉 免费领取50元代金券</h1>
    <p class="mt-2 text-sm text-white/95">限前50名，每天仅开放20个名额</p>
  </div>

  <div class="p-6">
    <p class="text-center text-gray-600 text-sm mb-5">👇 填写信息立即领取</p>

    <div class="space-y-3">
      <div>
        <label for="name" class="block text-xs font-medium text-gray-500 mb-1">姓名</label>
        <input id="name" type="text" autocomplete="name" placeholder="请输入姓名" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none" />
      </div>
      <div>
        <label for="phone" class="block text-xs font-medium text-gray-500 mb-1">电话</label>
        <input id="phone" type="tel" autocomplete="tel" placeholder="请输入手机号" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none" />
      </div>
      <div>
        <label for="wechat" class="block text-xs font-medium text-gray-500 mb-1">微信</label>
        <input id="wechat" type="text" autocomplete="off" placeholder="请输入微信号" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-orange-400 focus:border-orange-400 outline-none" />
      </div>
    </div>

    <button type="button" onclick="submitForm()"
      class="mt-5 w-full bg-gradient-to-r from-orange-500 to-rose-500 hover:from-orange-600 hover:to-rose-600 text-white font-semibold py-3 rounded-xl shadow-md transition">
      立即领取优惠
    </button>

    <ul class="mt-6 space-y-2 text-sm text-gray-700">
      <li class="flex items-start gap-2">
        <span class="text-emerald-600 shrink-0">✔</span>
        <span>到店可直接使用</span>
      </li>
      <li class="flex items-start gap-2">
        <span class="text-emerald-600 shrink-0">✔</span>
        <span>无隐形消费</span>
      </li>
      <li class="flex items-start gap-2">
        <span class="text-emerald-600 shrink-0">✔</span>
        <span>支持堂食/外带</span>
      </li>
    </ul>

    <p class="mt-5 text-center text-xs text-gray-500">已有132人领取</p>
  </div>
</div>

<!-- ===== 提交成功页 ===== -->
<div id="successPage" class="hidden bg-white w-full max-w-md rounded-2xl shadow-lg border border-emerald-100 overflow-hidden">
  <div class="bg-gradient-to-r from-emerald-500 to-teal-500 px-6 py-5 text-white text-center">
    <h1 class="text-xl font-bold leading-snug">🎉 领取成功！</h1>
  </div>

  <div class="p-6 text-center">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-amber-50 mb-4">
      <span class="text-3xl">⚠️</span>
    </div>
    <p class="text-base font-semibold text-gray-800">请立即添加微信领取优惠券</p>

    <div class="mt-5 bg-gray-50 rounded-xl p-4">
      <p class="flex items-center justify-center gap-2 text-sm text-gray-700 mb-3">
        <span class="shrink-0">👉</span>
        <span>长按识别二维码</span>
      </p>
      <img src="wx_qr_code.jpg" alt="微信二维码" class="mx-auto w-48 h-48 object-contain rounded-lg border border-gray-200" />
      <p class="flex items-center justify-center gap-2 text-sm text-gray-700 mt-3">
        <span class="shrink-0">👉</span>
        <span>或复制微信号：<span id="wxId" class="font-mono font-semibold text-orange-600 select-all">guo597246676</span></span>
      </p>
      <button type="button" onclick="copyWxId()"
        class="w-full mt-3 bg-orange-500 hover:bg-orange-600 text-white text-sm font-medium py-2 rounded-lg transition">
        点击复制微信号
      </button>
    </div>

    <div class="mt-5 bg-rose-50 border border-rose-200 rounded-xl px-4 py-3">
      <p class="text-rose-600 font-semibold text-sm">
        ⏳ 名额仅保留 <span id="countdown" class="font-mono tabular-nums">10:00</span>
      </p>
      <p class="text-rose-500 text-xs mt-1">超时失效，请尽快添加</p>
    </div>

    <p class="mt-4 text-xs text-gray-400 animate-pulse">已有人正在领取，请尽快添加</p>
  </div>
</div>

<script>
const SUPABASE_URL = "https://kgxxlbixplptzscepdbt.supabase.co";
const SUPABASE_KEY = "sb_publishable_o99FOcLnxPn5Mh3tuJ3H7Q_JEjQ6NpS";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

window.submitForm = async function () {
  const { data, error } = await client
    .from('leads')
    .insert({
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      wechat: document.getElementById('wechat').value
    });

  if (error) {
    console.error(error);
    alert("提交失败：" + error.message);
  } else {
    document.getElementById('formPage').classList.add('hidden');
    document.getElementById('successPage').classList.remove('hidden');
    startCountdown(10 * 60);
  }
};

function startCountdown(seconds) {
  const el = document.getElementById('countdown');
  const tick = () => {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    if (seconds <= 0) { clearInterval(timer); el.textContent = '已失效'; return; }
    seconds--;
  };
  tick();
  const timer = setInterval(tick, 1000);
}

window.copyWxId = function () {
  const wxText = document.getElementById('wxId').textContent;
  navigator.clipboard.writeText(wxText).then(() => {
    alert('已复制微信号：' + wxText);
  }).catch(() => {
    prompt('请手动复制微信号：', wxText);
  });
};
</script>

</body>
</html>
